# https://github.com/vergil-project/vergil-actions/blob/develop/.github/workflows/README.md
name: CD

on:
  push:
    branches: [develop, main]
  workflow_dispatch:

permissions:
  # Needed because the release job calls cd-release.yml@v2.1, whose CI-evidence
  # harvest downloads the release PR's artifacts; a reusable workflow cannot
  # request more permission than its caller grants.
  actions: read
  attestations: write
  contents: write
  id-token: write
  pull-requests: write

jobs:
  docs:
    uses: vergil-project/vergil-actions/.github/workflows/cd-docs.yml@v2.1
    permissions:
      contents: write

  release:
    if: github.ref == 'refs/heads/main'
    uses: vergil-project/vergil-actions/.github/workflows/cd-release.yml@v2.1
    secrets: inherit
